name: Release

# Tag a commit (e.g. `git tag v0.3.1 && git push --tags`) to build every
# OS/arch, publish a GitHub Release with checksums, and update the Homebrew tap
# and the .deb/.rpm packages, all via GoReleaser (see .goreleaser.yaml).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history and tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          # GITHUB_TOKEN publishes the release in this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TAP_GITHUB_TOKEN pushes the formula to the homebrew-tap repo. Set it
          # in repo Settings > Secrets. Without it the release and binaries still
          # publish; only the Homebrew tap update is skipped/failed.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
